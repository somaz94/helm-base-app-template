# =============================================================================
# Base-AWS Helm Chart - Default Values
# AWS EKS Helm chart for applications
# =============================================================================

# -- Number of pod replicas
# Ref: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
replicaCount: 1

# -- Version label added to pods for canary/blue-green routing
# Used by Service selector to route traffic to specific version pods
# version: ""

# =============================================================================
# Container Image
# Ref: https://kubernetes.io/docs/concepts/containers/images/
# =============================================================================
image:
  repository: 123456789012.dkr.ecr.us-east-1.amazonaws.com/somaz/app
  pullPolicy: IfNotPresent
  # -- Overrides the image tag whose default is the chart appVersion
  tag: ""

# =============================================================================
# Image Pull Secrets
# Ref: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
# NOTE: ECR authentication is typically handled by IRSA (IAM Roles for Service Accounts),
# so imagePullSecrets is usually not needed for AWS ECR.
# =============================================================================
imagePullSecrets: []

# -- Override the chart name used in resource naming
nameOverride: ""
# -- Override the full release name used in resource naming
fullnameOverride: ""

# =============================================================================
# Service Account
# Ref: https://kubernetes.io/docs/concepts/security/service-accounts/
# =============================================================================
serviceAccount:
  # -- Specifies whether a service account should be created
  create: true
  # -- Automatically mount the ServiceAccount API credentials
  automount: true
  # -- Annotations to add to the service account (e.g., IRSA role ARN)
  annotations: {}
    # eks.amazonaws.com/role-arn: arn:aws:iam::role/my-role
  # -- The name of the service account to use
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# =============================================================================
# Pod Metadata
# =============================================================================
# -- Annotations to add to pods
# Ref: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}

# -- Labels to add to pods (in addition to default selector labels)
# Ref: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

# =============================================================================
# Security Context
# =============================================================================
# -- Pod-level security context (applies to all containers)
# Ref: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/
podSecurityContext: {}
  # fsGroup: 2000

# -- Container-level security context
securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# =============================================================================
# Service
# Ref: https://kubernetes.io/docs/concepts/services-networking/service/
# =============================================================================
service:
  # -- Service type: ClusterIP, NodePort, or LoadBalancer
  type: ClusterIP
  # -- Service port (external)
  port: 80
  # -- Container port the service forwards to
  targetPort: 8080

# =============================================================================
# Ingress (Main - AWS ALB)
# Ref: https://kubernetes.io/docs/concepts/services-networking/ingress/
# Uses AWS Load Balancer Controller with ALB annotations
# Ref: https://kubernetes-sigs.github.io/aws-load-balancer-controller/
# =============================================================================
ingress:
  # -- Enable main ingress resource creation
  enabled: false
  # className: "alb"
  # annotations:
  #   alb.ingress.kubernetes.io/scheme: internet-facing
  #   alb.ingress.kubernetes.io/target-type: ip
  #   # Ingress Group - share a single ALB across multiple ingresses
  #   alb.ingress.kubernetes.io/group.name: somaz-shared-alb
  #   alb.ingress.kubernetes.io/group.order: "3"  # 1-1000, lower = higher priority
  #   # Health check
  #   alb.ingress.kubernetes.io/healthcheck-path: /health
  #   alb.ingress.kubernetes.io/healthcheck-port: traffic-port
  #   alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
  #   # Header-based routing for canary/versioned deployments
  #   alb.ingress.kubernetes.io/conditions.rule-app: |
  #     [{"field":"http-header","httpHeaderConfig":{"httpHeaderName":"Client-Version","values":["0.1.0"]}}]
  #   alb.ingress.kubernetes.io/actions.rule-app: |
  #     {"type":"forward","forwardConfig":{"targetGroups":[{"serviceName":"app-service","servicePort":"80","weight":100}]}}
  #   # ALB settings
  #   alb.ingress.kubernetes.io/load-balancer-name: somaz-shared-alb-loadbalancer
  #   alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS": 443}]'
  #   # ACM certificate for TLS termination
  #   alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:123456789012:certificate/abcd1234-5678-90ef-ghij-klmnopqrstuv
  #   # Target group tuning
  #   alb.ingress.kubernetes.io/target-group-attributes: |
  #     deregistration_delay.timeout_seconds=30,
  #     stickiness.enabled=false
  #   alb.ingress.kubernetes.io/tags: "Purpose=CDN-Origin"
  # hosts:
  #   - host: alpha-game.somaz.example.com
  #     paths:
  #       - path: /
  #         pathType: Prefix
  #         useAnnotation: true       # Use ALB action annotation routing
  #         serviceName: rule-app     # Matches annotation condition/action name

# =============================================================================
# Ingress - Review (iOS App Review)
# Separate ingress for iOS app store review traffic with version-specific routing
# =============================================================================
ingressReview:
  # -- Enable review ingress (iOS app review with Client-Version header routing)
  enabled: false

# =============================================================================
# Ingress - Health Check
# Dedicated ingress for health endpoint without header conditions
# =============================================================================
ingressHealth:
  # -- Enable health check ingress (no header conditions, high priority)
  enabled: false
  # className: "alb"
  # annotations:
  #   alb.ingress.kubernetes.io/scheme: internet-facing
  #   alb.ingress.kubernetes.io/target-type: ip
  #   alb.ingress.kubernetes.io/group.name: somaz-shared-alb
  #   alb.ingress.kubernetes.io/group.order: "1"  # Highest priority
  #   alb.ingress.kubernetes.io/conditions.rule-health: |
  #     [{"field":"path-pattern","pathPatternConfig":{"values":["/health*"]}}]
  #   alb.ingress.kubernetes.io/actions.rule-health: |
  #     {"type":"forward","forwardConfig":{"targetGroups":[{"serviceName":"app-service","servicePort":"80","weight":100}]}}
  #   alb.ingress.kubernetes.io/load-balancer-name: somaz-shared-alb-loadbalancer
  #   alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS": 443}]'
  #   alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:123456789012:certificate/abcd1234-5678-90ef-ghij-klmnopqrstuv
  #   alb.ingress.kubernetes.io/target-group-attributes: |
  #     deregistration_delay.timeout_seconds=30,
  #     stickiness.enabled=false
  #   alb.ingress.kubernetes.io/tags: "Purpose=CDN-Origin"
  # hosts:
  #   - host: alpha-game.somaz.example.com
  #     paths:
  #       - path: /health
  #         pathType: Prefix
  #         useAnnotation: true
  #         serviceName: rule-health

# =============================================================================
# Ingress - API Docs
# Dedicated ingress for API documentation without header conditions
# =============================================================================
ingressApiDocs:
  # -- Enable API docs ingress
  enabled: false
  # className: "alb"
  # annotations:
  #   alb.ingress.kubernetes.io/group.order: "2"  # Second priority
  #   alb.ingress.kubernetes.io/conditions.rule-apidocs: |
  #     [{"field":"path-pattern","pathPatternConfig":{"values":["/api-docs*"]}}]
  #   alb.ingress.kubernetes.io/actions.rule-apidocs: |
  #     {"type":"forward","forwardConfig":{"targetGroups":[{"serviceName":"app-service","servicePort":"80","weight":100}]}}
  # hosts:
  #   - host: alpha-game.somaz.example.com
  #     paths:
  #       - path: /api-docs
  #         pathType: Prefix
  #         useAnnotation: true
  #         serviceName: rule-apidocs

# -- Number of old ReplicaSets to retain for rollback
revisionHistoryLimit: 1

# =============================================================================
# Resources
# Ref: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
# =============================================================================
# -- CPU/memory resource requests and limits
resources: {}
  # limits:
  #   cpu: 1000m
  #   memory: 2Gi
  # requests:
  #   cpu: 100m
  #   memory: 1Gi

# =============================================================================
# Deployment Strategy
# Ref: https://kubernetes.io/docs/concepts/workloads/controllers/deployment/#strategy
# =============================================================================
strategy:
  # -- Enable custom deployment strategy (default: Kubernetes rolling update)
  enabled: false
  config:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: "50%"

# =============================================================================
# Probes
# Ref: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
# =============================================================================
# -- Liveness probe configuration (set to empty {} if app has no health endpoint)
livenessProbe: {}
  # httpGet:
  #   path: /health
  #   port: http

# -- Readiness probe configuration (set to empty {} if app has no health endpoint)
readinessProbe: {}
  # httpGet:
  #   path: /health
  #   port: http

# =============================================================================
# Autoscaling (HPA)
# Ref: https://kubernetes.io/docs/concepts/workloads/autoscaling/
# =============================================================================
autoscaling:
  # -- Enable Horizontal Pod Autoscaler
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# =============================================================================
# RBAC
# Ref: https://kubernetes.io/docs/reference/access-authn-authz/rbac/
# =============================================================================
rbac:
  # -- Enable RBAC resource creation
  # NOTE: Template files for Role/RoleBinding are not yet implemented.
  enabled: false

# =============================================================================
# Scheduling
# =============================================================================
# -- Node selector for pod scheduling (e.g., target specific EKS node groups)
nodeSelector: {}
  # eks.amazonaws.com/nodegroup: ExampleNodegroupBaseNodeGroupA-XY9ZAmuND3P3

tolerations: []

affinity: {}

# =============================================================================
# Environment Variables
# =============================================================================
# -- Key-value pairs injected as container env vars
envConfig: {}
  # NODE_ENV: production

# =============================================================================
# ConfigMap
# =============================================================================
configs:
  enabled: false
  # items:
  #   - name: app-config
  #     datas:
  #       NODE_ENV: "production"
  #       SERVER_PORT: "8080"
  #       DB_HOST: "your-db-host.example.com"
  #       DB_PORT: "3306"
  #       DB_USER: "dbuser"
  #       DB_PASSWORD: "examplePassword123!"

# =============================================================================
# Extra Volumes & Mounts
# For volumes not covered by EFS (secrets, configMaps, etc.)
# =============================================================================
# -- Additional volumes to add to the Deployment
volumes: []
  # - name: config-volume
  #   configMap:
  #     name: special-config

# -- Additional volume mounts to add to the main container
volumeMounts: []
  # - name: config-volume
  #   mountPath: /etc/config

# =============================================================================
# AWS EFS Storage
# Ref: https://github.com/kubernetes-sigs/aws-efs-csi-driver
# Uses EFS CSI driver for persistent storage on AWS EKS.
# Each PV item requires its own fileSystemId and optional accessPointId.
# =============================================================================
efs:
  persistentVolumes:
    # -- Enable EFS PersistentVolume creation
    enabled: false
    # items:
    #   - name: "app-data-pv"
    #     fileSystemId: "fs-0example123abc456"       # EFS file system ID (required)
    #     accessPointId: "fsap-0example789def012"     # EFS access point ID (optional)
    #     storage: "5Gi"
    #     volumeMode: Filesystem
    #     accessModes:
    #       - ReadWriteMany
    #     reclaimPolicy: Retain
    #     storageClassName: "efs-sc"

  persistentVolumeClaims:
    # -- Enable EFS PersistentVolumeClaim creation
    enabled: false
    # items:
    #   - name: "app-data-pvc"
    #     accessModes:
    #       - ReadWriteMany
    #     storageClassName: "efs-sc"
    #     storage: "5Gi"
    #     mountPath: "/app/data"           # Auto-mounted to main container
    #     selector:                        # Optional: bind to specific PV
    #       volumeName: "app-data-pv"
