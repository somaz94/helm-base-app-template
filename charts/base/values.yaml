# =============================================================================
# Base Helm Chart - Default Values
# Generic Helm chart template for Kubernetes applications
# =============================================================================

# -- Number of pod replicas
# Ref: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
replicaCount: 1

# -- Version label added to pods for canary/blue-green routing
# Used by Service selector to route traffic to specific version pods
version: ""

# -- Environment name injected as ENVIRONMENT env var into main and init containers
# Example: "dev", "staging", "production"
environment: ""

# =============================================================================
# Container Image
# Ref: https://kubernetes.io/docs/concepts/containers/images/
# =============================================================================
image:
  repository: harbor.somaz.example.com/somaz/app
  pullPolicy: IfNotPresent
  # -- Overrides the image tag whose default is the chart appVersion
  tag: ""

# =============================================================================
# Image Pull Credentials
# Generates a docker-registry Secret for private registry authentication
# Ref: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
# =============================================================================
imageCredentials:
  enabled: true
  registry: https://harbor.somaz.example.com
  username: robot$example
  password: exampleRobotTokenXXXXXXXXXX
  name: harbor-robot-secret

imagePullSecrets:
  - name: harbor-robot-secret

# -- Override the chart name used in resource naming
nameOverride: ""
# -- Override the full release name used in resource naming
fullnameOverride: ""

# =============================================================================
# Service Account
# Ref: https://kubernetes.io/docs/concepts/security/service-accounts/
# =============================================================================
serviceAccount:
  # -- Specifies whether a service account should be created
  create: true
  # -- Automatically mount the ServiceAccount API credentials
  automount: true
  # -- Annotations to add to the service account
  annotations: {}
  # -- The name of the service account to use
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# =============================================================================
# Pod Metadata
# =============================================================================
# -- Annotations to add to pods
# Ref: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}

# -- Labels to add to pods (in addition to default selector labels)
# Ref: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

# =============================================================================
# Security Context
# =============================================================================
# -- Pod-level security context (applies to all containers)
# Ref: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/
podSecurityContext: {}
  # fsGroup: 2000

# -- Container-level security context
securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# =============================================================================
# Service
# Ref: https://kubernetes.io/docs/concepts/services-networking/service/
# =============================================================================
service:
  # -- Service type: ClusterIP, NodePort, or LoadBalancer
  type: ClusterIP
  # -- Service port (external)
  port: 80
  # -- Container port the service forwards to
  targetPort: 8080

# =============================================================================
# Ingress
# Ref: https://kubernetes.io/docs/concepts/services-networking/ingress/
# =============================================================================
ingress:
  # -- Name suffix for the ingress resource
  name: base-ingress
  # -- Enable ingress resource creation
  enabled: false
  # className: "nginx"
  # annotations: {}
  # hosts:
  #   - host: example.local
  #     paths:
  #       - path: /
  #         pathType: ImplementationSpecific
  # tls: []

# =============================================================================
# Probes
# Ref: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
# =============================================================================
# -- Liveness probe configuration (empty = no probe)
# WARNING: Setting to {} will render an empty probe block. Set specific probe config or leave empty.
livenessProbe: {}
  # httpGet:
  #   path: /health
  #   port: http

# -- Readiness probe configuration (empty = no probe)
readinessProbe: {}
  # httpGet:
  #   path: /health
  #   port: http

# =============================================================================
# Resources
# Ref: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
# =============================================================================
# -- CPU/memory resource requests and limits
resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# =============================================================================
# Deployment Strategy
# Ref: https://kubernetes.io/docs/concepts/workloads/controllers/deployment/#strategy
# =============================================================================
strategy:
  # -- Enable custom deployment strategy (default: Kubernetes rolling update)
  enabled: false
  config:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: "50%"

# =============================================================================
# Autoscaling (HPA)
# Ref: https://kubernetes.io/docs/concepts/workloads/autoscaling/
# =============================================================================
autoscaling:
  # -- Enable Horizontal Pod Autoscaler
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# =============================================================================
# RBAC
# Ref: https://kubernetes.io/docs/reference/access-authn-authz/rbac/
# =============================================================================
rbac:
  # -- Enable RBAC resource creation (Role, RoleBinding)
  # NOTE: Template files for Role/RoleBinding are not yet implemented.
  # Currently only used for cert-cleanup CronJob serviceAccountName.
  enabled: false
  # serviceAccountName: ""
  # role:
  #   name: cert-job-manager-base
  #   resources:
  #     - apiGroups: ["cert-manager.io"]
  #       resources: ["certificaterequests"]
  #       verbs: ["get", "list", "watch", "delete"]
  #     - apiGroups: ["batch"]
  #       resources: ["jobs"]
  #       verbs: ["get", "list", "watch", "delete"]
  # roleBinding:
  #   name: cert-job-manager-binding-base

# =============================================================================
# Scheduling
# =============================================================================
nodeSelector: {}
tolerations: []
affinity: {}

# -- Number of old ReplicaSets to retain for rollback
revisionHistoryLimit: 1

# =============================================================================
# Environment Variables
# =============================================================================
# -- Key-value pairs injected as container env vars (in addition to ENVIRONMENT)
envConfig: {}
  # NODE_ENV: production
  # LOG_LEVEL: info

# =============================================================================
# ConfigMap
# =============================================================================
configs:
  # -- Enable ConfigMap creation and envFrom injection
  enabled: false
  # items:
  #   - name: app-config
  #     datas:
  #       APP_ENV: "production"
  #       DEBUG: "false"

# =============================================================================
# Init Containers
# Ref: https://kubernetes.io/docs/concepts/workloads/pods/init-containers/
# =============================================================================
initContainers:
  # -- Enable init containers (runs before main container starts)
  enabled: false
  # items:
  #   - name: data-downloader
  #     image: alpine:latest
  #     imagePullPolicy: IfNotPresent
  #     command: ["/bin/sh", "-c", "echo hello"]
  #     env:
  #       - name: FILE_SERVER_URL
  #         value: "https://file-server.somaz.example.com"
  #     volumeMounts:
  #       - name: data-volume
  #         mountPath: /app/data
  #     resources:
  #       requests:
  #         memory: "64Mi"
  #         cpu: "50m"
  #       limits:
  #         memory: "128Mi"
  #         cpu: "100m"

# =============================================================================
# EmptyDir Volumes
# Ref: https://kubernetes.io/docs/concepts/storage/volumes/#emptydir
# =============================================================================
emptyDirVolumes:
  # -- Enable emptyDir volumes (ephemeral, shared between init and main containers)
  enabled: false
  # items:
  #   - name: data-volume
  #     mountPath: /app/data
  #     readOnly: true
  #     sizeLimit: "1Gi"
  #     # medium: "Memory"  # Use tmpfs (RAM-backed)

# =============================================================================
# Persistent Volumes (NFS)
# Ref: https://kubernetes.io/docs/concepts/storage/persistent-volumes/
# NOTE: Currently hardcoded to NFS backend only
# =============================================================================
persistentVolumes:
  # -- Enable PersistentVolume creation
  enabled: false
  # items:
  #   - name: app-data-pv
  #     storage: 5Gi
  #     volumeMode: Filesystem
  #     accessModes:
  #       - ReadWriteMany
  #     reclaimPolicy: Retain
  #     storageClassName: nfs-client
  #     path: /data/app          # NFS export path
  #     server: 10.0.0.5         # NFS server IP

# =============================================================================
# Persistent Volume Claims
# Ref: https://kubernetes.io/docs/concepts/storage/persistent-volumes/#persistentvolumeclaims
# =============================================================================
persistentVolumeClaims:
  # -- Enable PersistentVolumeClaim creation
  enabled: false
  # items:
  #   - name: app-data-pvc
  #     accessModes:
  #       - ReadWriteOnce
  #     storageClassName: nfs-client
  #     storage: 5Gi
  #     mountPath: /app/data     # Auto-mounted to main container
  #     selector:                # Optional: bind to specific PV
  #       volumeName: app-data-pv

# =============================================================================
# Extra Volumes & Mounts
# For volumes not covered by the above (secrets, configMaps, etc.)
# =============================================================================
# -- Additional volumes to add to the Deployment
extraVolumes: []
  # - name: config-volume
  #   configMap:
  #     name: special-config

# -- Additional volume mounts to add to the main container
extraVolumeMounts: []
  # - name: config-volume
  #   mountPath: /etc/config

# =============================================================================
# cert-manager Certificate
# Ref: https://cert-manager.io/docs/usage/certificate/
# =============================================================================
certificate:
  # -- Enable cert-manager Certificate resource creation
  enabled: false
  # secretName: app-tls
  # commonName: app.example.com
  # duration: 2160h0m0s     # 90 days
  # renewBefore: 720h0m0s   # 30 days before expiry
  # dnsNames:
  #   - app.example.com
  # issuerName: route53-issuer    # AWS Route53
  # # issuerName: clouddns-issuer # GCP Cloud DNS
  # issuerKind: ClusterIssuer

# =============================================================================
# Certificate Cleanup CronJob
# Deletes old CertificateRequests and completed Jobs on a daily schedule
# Requires RBAC to be configured with appropriate permissions
# =============================================================================
certCleanup:
  # -- Enable daily certificate cleanup CronJob
  enabled: false
  # CronJobName: cert-cleanup-cronjob
  # olderThanDays: 100     # Delete CertificateRequests older than N days
  # YesterDays: 1          # Delete completed Jobs from N days ago
